services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-babili}
      POSTGRES_USER: ${POSTGRES_USER:-babili}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-babili_dev_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U babili"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/web/.next
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://babili:babili_dev_pass@postgres:5432/babili?schema=public
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
    command: npm run dev

  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: ../../Dockerfile.dev.service
    ports:
      - "4000:4000"
    volumes:
      - ./services/api-gateway:/app
      - /app/node_modules
    environment:
      - PORT=4000
      - NODE_ENV=development
    command: npx tsx watch src/index.ts

  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: ../../Dockerfile.dev.service
    ports:
      - "4001:4001"
    volumes:
      - ./services/auth-service:/app
      - /app/node_modules
    environment:
      - PORT=4001
      - NODE_ENV=development
      - DATABASE_URL=postgresql://babili:babili_dev_pass@postgres:5432/babili?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    command: npx tsx watch src/index.ts

  restaurant-service:
    build:
      context: ./services/restaurant-service
      dockerfile: ../../Dockerfile.dev.service
    ports:
      - "4002:4002"
    volumes:
      - ./services/restaurant-service:/app
      - /app/node_modules
    environment:
      - PORT=4002
      - NODE_ENV=development
      - DATABASE_URL=postgresql://babili:babili_dev_pass@postgres:5432/babili?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    command: npx tsx watch src/index.ts

  order-service:
    build:
      context: ./services/order-service
      dockerfile: ../../Dockerfile.dev.service
    ports:
      - "4003:4003"
    volumes:
      - ./services/order-service:/app
      - /app/node_modules
    environment:
      - PORT=4003
      - NODE_ENV=development
      - DATABASE_URL=postgresql://babili:babili_dev_pass@postgres:5432/babili?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    command: npx tsx watch src/index.ts

  translation-service:
    build:
      context: ./services/translation-service
      dockerfile: ../../Dockerfile.dev.service
    ports:
      - "4004:4004"
    volumes:
      - ./services/translation-service:/app
      - /app/node_modules
    environment:
      - PORT=4004
      - NODE_ENV=development
    command: npx tsx watch src/index.ts

volumes:
  postgres_data:
