services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
    depends_on:
      postgres:
        condition: service_healthy
      api-gateway:
        condition: service_started
    restart: unless-stopped

  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: ../../Dockerfile.service
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - NODE_ENV=production
    restart: unless-stopped

  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: ../../Dockerfile.service
    ports:
      - "4001:4001"
    environment:
      - PORT=4001
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  restaurant-service:
    build:
      context: ./services/restaurant-service
      dockerfile: ../../Dockerfile.service
    ports:
      - "4002:4002"
    environment:
      - PORT=4002
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  order-service:
    build:
      context: ./services/order-service
      dockerfile: ../../Dockerfile.service
    ports:
      - "4003:4003"
    environment:
      - PORT=4003
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  translation-service:
    build:
      context: ./services/translation-service
      dockerfile: ../../Dockerfile.service
    ports:
      - "4004:4004"
    environment:
      - PORT=4004
      - NODE_ENV=production
    restart: unless-stopped

volumes:
  postgres_data:
